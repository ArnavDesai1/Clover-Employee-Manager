spring.application.name=employee-service

# ===============================
# DATABASE (MySQL local / PostgreSQL on Render)
# On Render: set SPRING_DATASOURCE_URL, USERNAME, PASSWORD to your PostgreSQL instance.
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_manager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:GOKANO.com1}
# Driver auto-detected from URL (MySQL or PostgreSQL)

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ⚠️ IMPORTANT: REMOVE MySQL8Dialect (Hibernate 7)
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect ❌
# Let Spring auto-detect dialect ✅

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# FRONTEND (for reset link in email)
# For local: http://localhost:3000. For deploy: set APP_FRONTEND_URL to your live URL (e.g. https://yourapp.com).
# ===============================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# ===============================
# MAIL (password reset emails)
# Set MAIL_USERNAME and MAIL_PASSWORD (e.g. Gmail app password) to send real emails.
# If not set, forgot-password still works but no email is sent (user can use demo link).
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true